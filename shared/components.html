<!--
  AI-Sale 共享组件库 — 可直接嵌入各 scene HTML
  版本: v1.0 | 日期: 2026-05-20

  使用方式：
  1. 在 HTML <body> 末尾引入本文件（<link rel="import" href=".../shared/components.html">）
     或将下方 HTML 代码复制到场景中
  2. JS 函数需在场景 JS 中调用，或直接复制到场景 <script> 中
-->

<!-- ================================================
     1. 骨架屏加载动画（AI 思考中）
     ================================================ -->
<template id="skeleton-ai-thinking">
  <div class="ai-thinking-wrap" style="display:flex;gap:12px;margin-bottom:16px;animation:fadeIn 0.3s ease">
    <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--color-primary),var(--color-primary-light));display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
    </div>
    <div style="flex:1;background:var(--gray-100);border-radius:16px;border-bottom-left-radius:4px;padding:12px 16px;min-height:60px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:12px;font-weight:600;color:var(--color-primary)">AI 顾问</span>
        <span class="ai-thinking" style="font-size:12px;color:var(--gray-400)"></span>
      </div>
      <div class="skeleton-lines">
        <div style="height:14px;background:var(--gray-200);border-radius:4px;margin-bottom:6px;width:85%;animation:pulse 1.5s infinite"></div>
        <div style="height:14px;background:var(--gray-200);border-radius:4px;margin-bottom:6px;width:70%;animation:pulse 1.5s 0.1s infinite"></div>
        <div style="height:14px;background:var(--gray-200);border-radius:4px;width:55%;animation:pulse 1.5s 0.2s infinite"></div>
      </div>
    </div>
  </div>
</template>

<!-- 骨架屏：卡片列表 -->
<template id="skeleton-card-list">
  <div style="display:flex;flex-direction:column;gap:12px">
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">
      <!-- 卡片骨架 × 3 -->
      <div style="background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-200);padding:20px;animation:pulse 1.5s infinite">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div style="width:40px;height:40px;border-radius:10px;background:var(--gray-200)"></div>
          <div style="flex:1">
            <div style="height:14px;background:var(--gray-200);border-radius:4px;width:60%;margin-bottom:6px"></div>
            <div style="height:12px;background:var(--gray-100);border-radius:4px;width:40%"></div>
          </div>
        </div>
        <div style="height:12px;background:var(--gray-100);border-radius:4px;margin-bottom:8px;width:90%"></div>
        <div style="height:12px;background:var(--gray-100);border-radius:4px;margin-bottom:8px;width:75%"></div>
        <div style="height:12px;background:var(--gray-100);border-radius:4px;width:50%"></div>
      </div>
      <div style="background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-200);padding:20px;animation:pulse 1.5s 0.15s infinite">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div style="width:40px;height:40px;border-radius:10px;background:var(--gray-200)"></div>
          <div style="flex:1">
            <div style="height:14px;background:var(--gray-200);border-radius:4px;width:55%;margin-bottom:6px"></div>
            <div style="height:12px;background:var(--gray-100);border-radius:4px;width:35%"></div>
          </div>
        </div>
        <div style="height:12px;background:var(--gray-100);border-radius:4px;margin-bottom:8px;width:85%"></div>
        <div style="height:12px;background:var(--gray-100);border-radius:4px;margin-bottom:8px;width:65%"></div>
        <div style="height:12px;background:var(--gray-100);border-radius:4px;width:45%"></div>
      </div>
      <div style="background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-200);padding:20px;animation:pulse 1.5s 0.3s infinite">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div style="width:40px;height:40px;border-radius:10px;background:var(--gray-200)"></div>
          <div style="flex:1">
            <div style="height:14px;background:var(--gray-200);border-radius:4px;width:50%;margin-bottom:6px"></div>
            <div style="height:12px;background:var(--gray-100);border-radius:4px;width:30%"></div>
          </div>
        </div>
        <div style="height:12px;background:var(--gray-100);border-radius:4px;margin-bottom:8px;width:80%"></div>
        <div style="height:12px;background:var(--gray-100);border-radius:4px;margin-bottom:8px;width:60%"></div>
        <div style="height:12px;background:var(--gray-100);border-radius:4px;width:40%"></div>
      </div>
    </div>
  </div>
</template>

<!-- ================================================
     2. 空状态组件（5 类）
     ================================================ -->

<!-- 空状态：无数据 -->
<template id="empty-no-data">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center">
    <div style="width:80px;height:80px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;margin-bottom:20px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="1.5">
        <path d="M3 7h18M3 12h18M3 17h18"/>
      </svg>
    </div>
    <h3 style="font-size:16px;font-weight:600;color:var(--gray-700);margin-bottom:8px">暂无数据</h3>
    <p style="font-size:14px;color:var(--gray-400);max-width:280px;line-height:1.6">当前还没有任何记录，试试先添加一条吧</p>
    <slot name="action"></slot>
  </div>
</template>

<!-- 空状态：无搜索结果 -->
<template id="empty-no-result">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center">
    <div style="width:80px;height:80px;border-radius:50%;background:var(--gray-100);display:flex;align-items:center;justify-content:center;margin-bottom:20px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--gray-300)" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
        <path d="M8 11h6M11 8v6"/>
      </svg>
    </div>
    <h3 style="font-size:16px;font-weight:600;color:var(--gray-700);margin-bottom:8px">没有找到相关结果</h3>
    <p style="font-size:14px;color:var(--gray-400);max-width:280px;line-height:1.6">试试调整关键词，或查看全部数据</p>
    <slot name="action"></slot>
  </div>
</template>

<!-- 空状态：无权限 -->
<template id="empty-no-permission">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center">
    <div style="width:80px;height:80px;border-radius:50%;background:var(--color-warning-50);display:flex;align-items:center;justify-content:center;margin-bottom:20px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--color-warning)" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h3 style="font-size:16px;font-weight:600;color:var(--gray-700);margin-bottom:8px">暂无访问权限</h3>
    <p style="font-size:14px;color:var(--gray-400);max-width:280px;line-height:1.6">请联系管理员开通权限后再试</p>
    <slot name="action"></slot>
  </div>
</template>

<!-- 空状态：网络异常 -->
<template id="empty-network-error">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center">
    <div style="width:80px;height:80px;border-radius:50%;background:var(--color-danger-50);display:flex;align-items:center;justify-content:center;margin-bottom:20px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--color-danger)" stroke-width="1.5">
        <path d="M1 1l22 22M9.88 9.88a3 3 0 1 0 4.24 4.24M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
      </svg>
    </div>
    <h3 style="font-size:16px;font-weight:600;color:var(--gray-700);margin-bottom:8px">网络连接异常</h3>
    <p style="font-size:14px;color:var(--gray-400);max-width:280px;line-height:1.6">请检查网络后点击重试</p>
    <button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:var(--color-primary);color:white;border:none;border-radius:var(--radius-md);font-size:14px;cursor:pointer">重试</button>
    <slot name="action"></slot>
  </div>
</template>

<!-- 空状态：AI 服务暂不可用 -->
<template id="empty-ai-unavailable">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center">
    <div style="width:80px;height:80px;border-radius:50%;background:var(--color-primary-50);display:flex;align-items:center;justify-content:center;margin-bottom:20px">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.5">
        <path d="M12 2a5 5 0 0 1 5 5v1a5 5 0 0 1-10 0V7a5 5 0 0 1 5-5z"/>
        <path d="M2 19a10 10 0 0 1 20 0"/>
        <path d="M12 14v4M10 16h4"/>
      </svg>
    </div>
    <h3 style="font-size:16px;font-weight:600;color:var(--gray-700);margin-bottom:8px">AI 顾问暂时不可用</h3>
    <p style="font-size:14px;color:var(--gray-400);max-width:280px;line-height:1.6">服务正在恢复中，请稍后再试或联系管理员</p>
    <button onclick="location.reload()" style="margin-top:16px;padding:8px 20px;background:var(--color-primary);color:white;border:none;border-radius:var(--radius-md);font-size:14px;cursor:pointer">刷新重试</button>
    <slot name="action"></slot>
  </div>
</template>

<!-- ================================================
     3. Toast 提示组件
     ================================================ -->
<div id="aisale-toast-container" style="position:fixed;bottom:24px;right:24px;z-index:var(--z-toast);display:flex;flex-direction:column;gap:8px;pointer-events:none"></div>

<style>
@keyframes toastSlideIn {
  from { opacity:0; transform: translateX(100%); }
  to   { opacity:1; transform: translateX(0); }
}
@keyframes toastSlideOut {
  from { opacity:1; transform: translateX(0); }
  to   { opacity:0; transform: translateX(100%); }
}
.aisale-toast {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  background: var(--gray-800);
  color: white;
  border-radius: var(--radius-lg);
  font-size: 14px;
  box-shadow: var(--shadow-xl);
  animation: toastSlideIn 0.3s ease;
  pointer-events: auto;
  max-width: 320px;
}
.aisale-toast.success { border-left: 4px solid var(--color-success); }
.aisale-toast.error   { border-left: 4px solid var(--color-danger); }
.aisale-toast.warning { border-left: 4px solid var(--color-warning); }
.aisale-toast.info    { border-left: 4px solid var(--color-info); }
.aisale-toast-icon { flex-shrink: 0; }
.aisale-toast.hiding { animation: toastSlideOut 0.3s ease forwards; }
</style>

<script>
/* ===== 工具函数 ===== */

/**
 * 显示 Toast 提示
 * @param {string} message - 提示文本
 * @param {'success'|'error'|'warning'|'info'} type - 类型
 * @param {number} duration - 显示时长(ms)，默认 3000
 */
function showToast(message, type = 'info', duration = 3000) {
  const container = document.getElementById('aisale-toast-container');
  const toast = document.createElement('div');
  toast.className = `aisale-toast ${type}`;

  const icons = {
    success: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#34D399" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>',
    error:   '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F87171" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M15 9l-6 6M9 9l6 6"/></svg>',
    warning: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FBBF24" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
    info:    '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#60A5FA" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>'
  };

  toast.innerHTML = `<span class="aisale-toast-icon">${icons[type] || icons.info}</span><span>${message}</span>`;
  container.appendChild(toast);

  setTimeout(() => {
    toast.classList.add('hiding');
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

/**
 * 模拟 AI 思考延迟（1.2~1.8s）
 * @returns {Promise}
 */
function aiDelay() {
  const ms = 1200 + Math.random() * 600;
  return new Promise(resolve => setTimeout(resolve, ms));
}

/**
 * 显示骨架屏（AI 思考中），返回移除函数
 * @param {HTMLElement} container - 挂载容器
 * @returns {Function} remove 函数
 */
function showAISkeleton(container) {
  const tpl = document.getElementById('skeleton-ai-thinking');
  const clone = tpl.content.cloneNode(true);
  container.appendChild(clone);
  return () => {
    const el = container.querySelector('.ai-thinking-wrap');
    if (el) el.remove();
  };
}

/**
 * 显示卡片列表骨架屏
 * @param {HTMLElement} container
 * @returns {Function} remove
 */
function showCardSkeleton(container) {
  const tpl = document.getElementById('skeleton-card-list');
  const clone = tpl.content.cloneNode(true);
  container.innerHTML = '';
  container.appendChild(clone);
  return () => { container.innerHTML = ''; };
}

/**
 * 渲染空状态
 * @param {HTMLElement} container
 * @param {'no-data'|'no-result'|'no-permission'|'network-error'|'ai-unavailable'} type
 * @param {string|HTMLElement} action - 可选的操作按钮/内容
 */
function showEmptyState(container, type, action) {
  const map = {
    'no-data':         'empty-no-data',
    'no-result':       'empty-no-result',
    'no-permission':   'empty-no-permission',
    'network-error':   'empty-network-error',
    'ai-unavailable':  'empty-ai-unavailable'
  };
  const tpl = document.getElementById(map[type]);
  if (!tpl) return;
  const clone = tpl.content.cloneNode(true);
  container.innerHTML = '';
  container.appendChild(clone);
  if (action) {
    const slot = container.querySelector('slot[name="action"]');
    if (slot) slot.appendChild(typeof action === 'string' ? createEl(action) : action);
  }
}

/** 辅助：创建 DOM 元素 */
function createEl(html) {
  const t = document.createElement('template');
  t.innerHTML = html.trim();
  return t.content.firstChild;
}

/* 全局挂载 */
window.showToast = showToast;
window.aiDelay = aiDelay;
window.showAISkeleton = showAISkeleton;
window.showCardSkeleton = showCardSkeleton;
window.showEmptyState = showEmptyState;
</script>
