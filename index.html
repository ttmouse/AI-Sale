<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Sale Demo 系统 - 智能厨具销售赋能</title>
  <link rel="stylesheet" href="shared/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <!-- Header -->
  <header class="demo-header">
    <div class="container">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
        <div style="width:48px;height:48px;background:rgba(255,255,255,0.15);border-radius:12px;display:flex;align-items:center;justify-content:center">
          <i class="fas fa-robot" style="font-size:24px;color:white"></i>
        </div>
        <div>
          <h1>AI-Sale 智能销售赋能系统</h1>
          <p>智能炒菜机 / 商用厨具行业 · 八大 AI 场景全链路 Demo</p>
        </div>
      </div>
      <div style="display:flex;gap:24px;margin-top:16px;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="width:10px;height:10px;background:#10B981;border-radius:50%"></span>
          <span style="font-size:14px;opacity:0.9">销售赋能：3 个场景</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="width:10px;height:10px;background:#0EA5E9;border-radius:50%"></span>
          <span style="font-size:14px;opacity:0.9">客户运营：3 个场景</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="width:10px;height:10px;background:#8B5CF6;border-radius:50%"></span>
          <span style="font-size:14px;opacity:0.9">资产沉淀：2 个场景</span>
        </div>
      </div>
    </div>
  </header>

  <!-- 场景网格 -->
  <main class="container">
    <div class="scene-grid" id="scene-grid"></div>
  </main>

  <!-- Footer -->
  <footer style="background:var(--gray-900);color:var(--gray-400);padding:32px 0;margin-top:48px">
    <div class="container" style="text-align:center">
      <p style="font-size:14px;margin-bottom:8px">AI-Sale 智能销售赋能解决方案</p>
      <p style="font-size:12px;opacity:0.6">适用行业：智能炒菜机 / 商用厨具 / 非标餐饮设备 · 高客单 / 长周期 / 重线下</p>
    </div>
  </footer>

  <script>
    const scenes = [
      { id: 1, name: '销售随身智能知识库', desc: '产品参数、场景适配、竞品对比，一问即答', badge: '销售赋能', badgeClass: 'tag-blue', icon: 'fa-book', path: 'scenes/scene-1-kb/index.html' },
      { id: 2, name: '企微实时话术参谋', desc: '侧边栏实时推荐话术，半自动辅助不替代人工', badge: '销售赋能', badgeClass: 'tag-blue', icon: 'fa-comments', path: 'scenes/scene-2-chat/index.html' },
      { id: 3, name: '客户分层+智能SOP跟进', desc: '自动标签分层，按阶段定时提醒触达', badge: '客户运营', badgeClass: 'tag-green', icon: 'fa-users', path: 'scenes/scene-3-crm/index.html' },
      { id: 4, name: '聊天记录AI复盘沉淀', desc: '成交案例拆解，流失原因分析，话术自动沉淀', badge: '资产沉淀', badgeClass: 'tag-purple', icon: 'fa-chart-line', path: 'scenes/scene-4-review/index.html' },
      { id: 5, name: '客户个性化数据应答', desc: '对接内部系统，实时查客户专属订单/售后/进度', badge: '客户运营', badgeClass: 'tag-green', icon: 'fa-database', path: 'scenes/scene-5-data/index.html' },
      { id: 6, name: 'AI新人模拟培训对练', desc: 'AI扮演各类客户，实战对练+三维评分', badge: '销售赋能', badgeClass: 'tag-blue', icon: 'fa-graduation-cap', path: 'scenes/scene-6-training/index.html' },
      { id: 7, name: '线索智能初筛评级', desc: '自动判定意向/预算/类型，优先推送高价值', badge: '客户运营', badgeClass: 'tag-green', icon: 'fa-filter', path: 'scenes/scene-7-leads/index.html' },
      { id: 8, name: '行业方案智能生成', desc: '按客户类型自动生成配套方案/案例/报价', badge: '资产沉淀', badgeClass: 'tag-purple', icon: 'fa-file-alt', path: 'scenes/scene-8-proposal/index.html' },
    ];

    const grid = document.getElementById('scene-grid');
    scenes.forEach(s => {
      const card = document.createElement('div');
      card.className = 'scene-card';
      card.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:12px">
          <div class="scene-number">${s.id}</div>
          <span class="tag ${s.badgeClass}">${s.badge}</span>
        </div>
        <div style="width:48px;height:48px;background:var(--gray-50);border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px">
          <i class="fas ${s.icon}" style="font-size:20px;color:var(--primary)"></i>
        </div>
        <h3 class="scene-title">${s.name}</h3>
        <p class="scene-desc">${s.desc}</p>
        <a href="${s.path}" class="scene-btn">
          进入 Demo <i class="fas fa-arrow-right" style="font-size:12px"></i>
        </a>
      `;
      card.addEventListener('click', (e) => {
        if (e.target.closest('a')) return;
        window.location.href = s.path;
      });
      grid.appendChild(card);
    });
  </script>
</body>
</html>
