<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>场景4：聊天记录AI复盘沉淀</title>
  <link rel="stylesheet" href="../../shared/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .review-layout { display: flex; gap: 16px; height: calc(100vh - 200px); }
    .chat-review { flex: 1; background: white; border-radius: var(--radius-lg); border: 1px solid var(--gray-200); overflow: hidden; display: flex; flex-direction: column; }
    .analysis-panel { flex: 1; background: white; border-radius: var(--radius-lg); border: 1px solid var(--gray-200); overflow-y: auto; padding: 20px; }
    .highlight-success { background: #D1FAE5; padding: 2px 4px; border-radius: 3px; }
    .highlight-danger { background: #FEE2E2; padding: 2px 4px; border-radius: 3px; }
    .insight-card { background: var(--gray-50); border-radius: var(--radius-md); padding: 14px; margin-bottom: 12px; border-left: 3px solid var(--primary); }
    .insight-card.success { border-left-color: var(--success); background: #ECFDF5; }
    .insight-card.danger { border-left-color: var(--danger); background: #FEF2F2; }
    .chat-row { padding: 10px 16px; border-bottom: 1px solid var(--gray-100); font-size: 13px; }
    .chat-row .speaker { font-weight: 600; margin-bottom: 2px; }
    .chat-row .time { font-size: 11px; color: var(--gray-400); }
    @media (max-width: 900px) { .review-layout { flex-direction: column; height: auto; } }
  </style>
</head>
<body class="scene-page">
  <nav class="scene-nav" id="scene-nav"></nav>

  <main class="scene-content">
    <div style="margin-bottom:16px">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="quick-tag" onclick="loadCase('success')" style="background:var(--success);color:white;border-color:var(--success)">成交案例：张老板</button>
        <button class="quick-tag" onclick="loadCase('fail')" style="background:var(--danger);color:white;border-color:var(--danger)">流失案例：刘老板</button>
        <button class="quick-tag" onclick="loadCase('recover')">挽回案例：李店长</button>
      </div>
    </div>

    <div class="review-layout">
      <!-- 左：聊天记录 -->
      <div class="chat-review">
        <div style="padding:14px 16px;border-bottom:1px solid var(--gray-200);background:var(--gray-50)">
          <div style="font-size:14px;font-weight:600" id="case-title">成交案例：张老板（川味轩）</div>
          <div style="font-size:12px;color:var(--gray-500);margin-top:2px" id="case-meta">23 轮对话 · 周期 18 天 · 结果：成交 2 台 YC-3000，总价 13.96 万</div>
        </div>
        <div style="flex:1;overflow-y:auto" id="chat-list"></div>
      </div>

      <!-- 右：AI 分析 -->
      <div class="analysis-panel">
        <h3 style="font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px">
          <i class="fas fa-robot" style="color:var(--primary)"></i>
          AI 复盘分析
        </h3>
        <div id="analysis-content"></div>
      </div>
    </div>
  </main>

  <script>
    initNav('聊天记录AI复盘沉淀', '资产沉淀', 'tag-purple');

    const cases = {
      success: {
        title: '成交案例：张老板（川味轩）',
        meta: '23 轮对话 · 周期 18 天 · 结果：成交 2 台 YC-3000，总价 13.96 万',
        chats: [
          { t: 'Day 1 10:30', s: '销售', text: '张老板您好！我是优特智厨的小王，朋友推荐的。' },
          { t: 'Day 1 10:35', s: '客户', text: '你好，我开川菜馆的，想了解你们机器' },
          { t: 'Day 1 10:40', s: '销售', text: '川菜是我们的强项！您门店多大？日均多少单？', highlight: 'success' },
          { t: 'Day 3 14:20', s: '销售', text: '张老板，下周三方便吗？我带上机器过去试菜', highlight: 'success' },
          { t: 'Day 10 11:00', s: '客户', text: '试菜味道不错，就是价格有点高' },
          { t: 'Day 10 11:15', s: '销售', text: '一台机器省 2 个厨师，一年省 12 万，8 个月就回本了', highlight: 'success' },
          { t: 'Day 15 16:30', s: '销售', text: '这月活动价截止 30 号，立减 3000 再送延保', highlight: 'success' },
          { t: 'Day 18 09:00', s: '客户', text: '好的，定 2 台，合同发我' },
        ],
        analysis: [
          { type: 'success', title: '⭐ 成功因素 1：第 3 轮主动约试菜', text: '试菜是成交的关键转折点，成交客户 78% 都经历了试菜。建议：兴趣期客户应在 3-5 天内完成试菜邀约。' },
          { type: 'success', title: '⭐ 成功因素 2：第 12 轮「人力成本换算法」', text: '客户说"贵"时，销售用"一台机器省 2 个厨师，一年省 12 万"成功转移价格焦点。此话术已沉淀为「金牌话术卡片」。' },
          { type: 'success', title: '⭐ 成功因素 3：第 18 轮制造紧迫感', text: '"活动截止 30 号"成功促单。注意：紧迫感需基于真实活动，不可虚构。' },
          { type: 'danger', title: '⚠️ 风险点：第 7 轮过于绝对', text: '销售说"我们的产品是最好的"，过于绝对易引起反感。建议改为："根据您的场景，我们的方案适配度比较高。"' },
          { type: 'insight', title: '沉淀产出', text: '• 话术卡片「人力成本换算法」已入库<br>• 关键动作：试菜邀约最佳时机（第 3 轮，兴趣期）<br>• SOP 更新：评估期→决策期 的促成策略' }
        ]
      },
      fail: {
        title: '流失案例：刘老板（火锅店）',
        meta: '15 轮对话 · 周期 12 天 · 结果：客户不再回复',
        chats: [
          { t: 'Day 1 09:00', s: '销售', text: '刘老板您好，我是优特智厨的' },
          { t: 'Day 1 09:05', s: '客户', text: '你们机器能做火锅底料吗？' },
          { t: 'Day 1 09:10', s: '销售', text: '能的，什么都能做', highlight: 'danger' },
          { t: 'Day 3 11:00', s: '客户', text: '多少钱？' },
          { t: 'Day 3 11:05', s: '销售', text: 'YC-3000 六万九千八', highlight: 'danger' },
          { t: 'Day 5 14:00', s: '客户', text: '有点贵，我再看看' },
          { t: 'Day 5 14:30', s: '销售', text: '不贵啊，别家更贵', highlight: 'danger' },
          { t: 'Day 12 10:00', s: '销售', text: '刘老板，考虑得怎么样了？' },
        ],
        analysis: [
          { type: 'danger', title: '❌ 流失点 1：第 3 轮过度承诺', text: '"什么都能做"是过度承诺。火锅底料对温控有特殊要求，应如实说明能力边界，建立信任。' },
          { type: 'danger', title: '❌ 流失点 2：第 5 轮过早报价', text: '客户仅问"能做火锅底料吗"，销售直接报 6.98 万，未先了解场景和需求。进入比价模式。' },
          { type: 'danger', title: '❌ 流失点 3：第 7 轮否定客户', text: '"不贵啊，别家更贵"是否定客户感受，引起对抗心理。正确做法：认同感受+转移焦点（"确实需要考虑，那您主要担心哪方面？"）' },
          { type: 'danger', title: '❌ 流失点 4：第 12 轮被动跟进', text: '时隔 7 天才跟进，且只是简单询问"考虑得怎么样"，未提供新价值。正确做法：发送同类案例或限时活动。' },
          { type: 'insight', title: '改进建议', text: '• 避免过度承诺，如实说明产品能力边界<br>• 前 3 轮不报价，先挖需求<br>• 客户说贵时，认同感受+转移焦点<br>• 跟进间隔不超过 3 天，每次提供新价值' }
        ]
      },
      recover: {
        title: '挽回案例：李店长（快食尚）',
        meta: '20 轮对话 · 周期 25 天 · 结果：从"考虑一下"到成交',
        chats: [
          { t: 'Day 1 10:00', s: '销售', text: '李店长，试菜后还满意吗？' },
          { t: 'Day 1 10:30', s: '客户', text: '味道还行，我再考虑考虑' },
          { t: 'Day 1 10:35', s: '销售', text: '理解，投资确实需要谨慎。您主要是担心哪方面？价格还是效果？', highlight: 'success' },
          { t: 'Day 3 14:00', s: '销售', text: '（发送视频）这是附近「快食尚」店长的反馈，用了 3 个月，后厨省了 2 个人', highlight: 'success' },
          { t: 'Day 7 09:00', s: '销售', text: '李店长，这月有个老客户推荐活动，推荐成功各返 2000', highlight: 'success' },
          { t: 'Day 10 11:00', s: '客户', text: '那行，我定一台' },
        ],
        analysis: [
          { type: 'success', title: '⭐ 挽回点 1：主动挖掘异议', text: '客户说"考虑"时，不被动等待，而是主动问"担心哪方面"，精准定位顾虑点。' },
          { type: 'success', title: '⭐ 挽回点 2：视频案例佐证', text: '发送真实客户反馈视频，比文字更有说服力。视频长度控制在 30 秒内。' },
          { type: 'success', title: '⭐ 挽回点 3：限时活动促单', text: '"老客户推荐活动"给双方都有利益，降低决策门槛。注意：活动需真实有效。' },
          { type: 'insight', title: '沉淀产出', text: '• 「异议挖掘三步法」已入库<br>• 客户犹豫时→发送案例视频→限时活动→成交<br>• 跟进节奏：Day 1→Day 3→Day 7（不空等）' }
        ]
      }
    };

    function loadCase(type) {
      const c = cases[type];
      document.getElementById('case-title').textContent = c.title;
      document.getElementById('case-meta').textContent = c.meta;

      // 渲染聊天记录
      const chatList = document.getElementById('chat-list');
      chatList.innerHTML = c.chats.map(ch => `
        <div class="chat-row">
          <div class="time">${ch.t}</div>
          <div class="speaker" style="color:${ch.s === '销售' ? 'var(--primary)' : 'var(--gray-700)'}">${ch.s}</div>
          <div style="margin-top:4px;color:var(--gray-700)">${ch.highlight === 'success' ? '<span class="highlight-success">' + ch.text + '</span>' : ch.highlight === 'danger' ? '<span class="highlight-danger">' + ch.text + '</span>' : ch.text}</div>
        </div>
      `).join('');

      // 渲染分析
      const analysisEl = document.getElementById('analysis-content');
      analysisEl.innerHTML = c.analysis.map(a => `
        <div class="insight-card ${a.type}">
          <div style="font-size:13px;font-weight:600;margin-bottom:6px">${a.title}</div>
          <div style="font-size:12px;color:var(--gray-600);line-height:1.7">${a.text}</div>
        </div>
      `).join('');
    }

    loadCase('success');

    function initNav(title, badge, badgeClass) {
      const nav = document.getElementById('scene-nav');
      if (!nav) return;
      nav.innerHTML = `
        <div class="scene-nav-inner">
          <a href="../../index.html" class="scene-nav-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            返回首页
          </a>
          <div style="display:flex;align-items:center;gap:12px">
            <span class="scene-nav-title">${title}</span>
            <span class="scene-nav-badge ${badgeClass}">${badge}</span>
          </div>
          <div style="width:60px"></div>
        </div>
      `;
    }
  </script>
</body>
</html>
