    .scene-hint-bar {
      display:flex; align-items:center; gap:10px;
      padding:10px 14px; margin-bottom:12px;

    .scene-hint-bar b { color:#3F2E08; font-weight:600; }
    .wecom-app { height: calc(100vh - 168px); min-height: 620px; }
    /* 故事剧本卡（隐藏式，hover 顶栏 ID 时浮出） */
    .scene-takeover-toast {
      position: fixed; right: 22px; bottom: 22px;
      background:#0F172A; color:#fff; padding:12px 16px;
      border-radius:12px; box-shadow:0 14px 36px rgba(15,23,42,.32);
      font-size:12.5px; line-height:1.55; max-width: 280px;
      transform: translateY(140%); opacity:0;
      transition: all .35s cubic-bezier(.25,.8,.3,1.05);
      z-index: 90; pointer-events:none;
    }
    .scene-takeover-toast.is-show { transform: translateY(0); opacity:1; }
    .scene-takeover-toast b { color:#5EEAD4; font-weight:600; }
    /* 未读红点动画 */
    @keyframes badge-pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      70%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    .wc-badge.is-anim { animation: badge-pop 0.5s ease; }
    /* 空状态提示 */
    .wc-empty-hint {
      padding: 32px 16px;
      text-align: center;
      color: var(--gray-400, #94A3B8);
      font-size: 13px;
    }
    /* 切换会话过渡 */
    .wc-chat-header { transition: background 0.25s; }
    .wc-chat-header.is-switching { background: rgba(37,99,235,0.06); }
    /* 引用气泡内提示 */
    .wc-typing-hint { color: var(--gray-400, #94A3B8); font-style: italic; font-size: 13px; }
    /* 接管状态 */
    .wc-chat-header.is-takeover {
      background: linear-gradient(90deg, rgba(14,165,233,0.08), rgba(14,165,233,0.03)) !important;
      border-bottom: 1.5px solid rgba(14,165,233,0.25);
    }
    /* AI 参谋面板脉冲 */
    .wc-aside.is-pulse {
      animation: aside-pulse 0.8s ease;
    }
    @keyframes aside-pulse {
      0%,100% { box-shadow: none; }
      40%      { box-shadow: 0 0 0 3px rgba(37,99,235,0.18); }
    }
    /* 插入输入框高亮 */
    .wc-input.is-flash {
      background: rgba(7,193,96,0.05) !important;
      box-shadow: inset 0 0 0 2px rgba(7,193,96,0.32) !important;
      border-radius: 4px;
      transition: all 0.18s ease;
    }

       场景级精修（v2 · design-taste pass）
       VARIANCE=8 · MOTION=6 · DENSITY=4
       ============================================================ */

    main.scene-content { font-feature-settings: "ss01", "tnum"; }
    main.scene-content ::selection { background: rgba(7,193,96,.18); color: #053D1F; }
    .wecom-app { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    .wecom-app *:focus-visible {
      outline: 2px solid rgba(7,193,96,.55);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .scene-hint-bar {
      background: #FFF8E8;
      border: 1px solid #F0DBA8;
      border-left: 0;
      border-radius: 8px;
      padding: 9px 14px 9px 14px;
      position: relative;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.55);
      letter-spacing: 0.1px;
      color: #5A4310;
    }
    .scene-hint-bar::before {
      content: "";
      position: absolute; left: 0; top: 8px; bottom: 8px;
      width: 3px;
      background: linear-gradient(180deg, #E8A623 0%, #C97E36 100%);
      border-radius: 2px;
    }
    .scene-hint-bar svg { color: #C9851A; }
    .scene-hint-bar b { color: #2E1F03; font-weight: 600; }

</head>

  // ---------- 3b. 会话切换 ----------
  function switchConversation(convId) {
    if (convId === activeConvId) return;
    activeConvId = convId;

    // 更新列表激活态
    document.querySelectorAll('.wc-conv-item').forEach(i => {
      i.classList.toggle('is-active', i.dataset.id === convId);
    });

    // 清空聊天区 + 切换到新剧本
    wcMsg.innerHTML = '';
    round = 1;
    const data = CONV_ROUNDS[convId];
    if (!data) {
      // 无剧本的客户：简单占位
      wcMsg.appendChild(WC.systemTip(`已切换至 ${convId} 的对话`));
      wcMsg.appendChild(WC.timeDivider('今天'));
      renderAside(null);
      WC.scrollBottom(wcMsg);
      updateChatHeader(convId);
      return;
    }

    updateChatHeader(convId, data);
    bootstrapConv(data);
  }

  function updateChatHeader(convId, data) {
    const h = document.querySelector('.wc-chat-header');
    const nameEl = h.querySelector('.wc-name');
    const metaEl = h.querySelector('.wc-chat-meta');
    const idEl = h.querySelector('.wc-id');
    if (data) {
      nameEl.textContent = data.name;
      metaEl.innerHTML = `<span class="wc-online-dot"></span><span>在线 · ${data.company}（${data.region}）</span>`;
      idEl.textContent = data.customerId;
    } else {
      const c = CONV_LIST.find(x => x.id === convId);
      nameEl.textContent = c ? c.name : convId;
      metaEl.innerHTML = `<span>${c ? c.sub : ''}</span>`;
      idEl.textContent = convId;
    }
  }

  // ---------- 3c. 增强 bootstrap（支持多种消息类型） ----------
  function bootstrapConv(data) {
    data.bootstrap.forEach(item => {
      if (item.type === 'system') {
        wcMsg.appendChild(WC.systemTip(item.text));
      } else if (item.type === 'time-div') {
        wcMsg.appendChild(WC.timeDivider(item.text));
      } else if (item.type === 'msg') {
        const cfg = {
          side: item.side,
          name: item.name,
          avatar: item.side === 'self' ? '李' : (item.name ? item.name.slice(0, 1) : '我'),
          colorClass: item.side === 'self' ? 'c4' : data.colorClass,
          content: item.content,
          time: item.time,
          online: item.online || false,
          status: item.status || null
        };
        // 消息类型扩展
        if (item.msgType === 'file') {
          cfg.type = 'file';
          cfg.file = item.file;
        } else if (item.msgType === 'image') {
          cfg.type = 'image';
          cfg.imageUrl = item.imageUrl;
        } else if (item.msgType === 'voice') {
          cfg.type = 'voice';
          cfg.voiceSec = item.voiceSec;
        }
        wcMsg.appendChild(WC.message(cfg));
      } else if (item.type === 'quote') {
        wcMsg.appendChild(WC.message({
          side: item.side, name: item.name,
          avatar: item.side === 'self' ? '李' : (item.name ? item.name.slice(0, 1) : '我'),
          colorClass: item.side === 'self' ? 'c4' : data.colorClass,
          content: item.content, time: item.time,
          quote: item.quote, status: item.status
        }));
      }
    });
    WC.scrollBottom(wcMsg);
    renderAside(data.rounds ? data.rounds[round - 1] : null);

            <div class="wc-next-item kind-${a.type}">
              <span class="wc-next-icon">
                ${a.type === 'send' ? WC.ICONS.send :
                  a.type === 'cal'  ? WC.ICONS.calendar :
                  a.type === 'tag'  ? WC.ICONS.tag :
                  a.type === 'esc'  ? WC.ICONS.user :
                                       WC.ICONS.alertCircle}
              </span>
              <div class="wc-next-main">
                <div class="wc-next-title">${a.title}</div>
                <div class="wc-next-detail">${a.detail}</div>
              </div>
              <button class="wc-next-btn">执行</button>
            </div>
          `).join('')}
        </div>
      </section>
      <section class="wc-aside-section">
        <div class="wc-aside-section-head">
          <span class="wc-aside-section-title">SOP 跟进时间表</span>
        </div>
        <ol class="wc-sop">
          <li><b>+ 0 min</b> · 实时回复（当前操作）</li>
          <li><b>+ 4h</b> · 二次跟进：发送案例视频 / 价格说明</li>
          <li><b>+ 24h</b> · 经理介入 · 试菜邀约确认</li>
          <li><b>+ 72h</b> · 仍无回复 → 转休眠池 + 月度激活策略</li>
        </ol>
      </section>
    `;
  }

  // tab 切换
  wcAsideTabs.addEventListener('click', e => {
    const t = e.target.closest('.wc-aside-tab');
    if (!t) return;
    activeTab = t.dataset.tab;
    wcAsideTabs.querySelectorAll('.wc-aside-tab').forEach(x => x.classList.remove('is-active'));
    t.classList.add('is-active');
    renderAside(getActiveRound());
  });

  // ---------- 5. 当前会话数据访问 ----------
  function getActiveData() {
    return CONV_ROUNDS[activeConvId] || null;
  }
  function getActiveRounds() {
    const d = getActiveData();
    return d ? d.rounds : null;
  }
  function getActiveRound() {
    const rounds = getActiveRounds();
    if (!rounds) return null;
    return rounds[round - 1] || null;
  }

  // ---------- 6. 聊天初始化（默认主剧本） ----------
  function bootstrap() {
    const data = getActiveData();
    if (data) {
      updateChatHeader(activeConvId, data);
      bootstrapConv(data);
    } else {
      bootstrapConv({
        bootstrap: [
          { type:'system', text:'已连接到 ' + activeConvId },
          { type:'time-div', text:'今天' }
        ]
      });
    }
  }

  // ---------- 7. 用户发送 ----------
  function sendUserMessage() {
    const text = (wcInput.value || '').trim();
    if (!text) return;
    wcInput.value = '';

    const now = nowHM();
    const data = getActiveData();

    // 我方消息 + 已读状态
    const myMsg = WC.message({
      side:'self', name:'我（小李 · 销售）', avatar:'李', colorClass:'c4',
      content:text, time:now, status:'sending'
    });
    wcMsg.appendChild(myMsg);
    WC.scrollBottom(wcMsg);

    // 模拟"已送达 / 已读"
    setTimeout(() => {
      const readEl = myMsg.querySelector('.wc-read');
      if (readEl) readEl.innerHTML = WC.ICONS.read + '<span>已读</span>';
    }, 900);

    // 客户回复（带打字气泡）
    const rounds = getActiveRounds();
    if (rounds && round <= rounds.length) {
      const rd = rounds[round - 1];
      const markMap = { 0:'turn', 1:'loss', 2:'turn' };
      WC.sendWithTyping(wcMsg, {
        side:'other', name:data.name, avatar:data.avatarChar, colorClass:data.colorClass,
        content: '<span class="wc-typing-hint">正在输入…</span>',
        time: addMin(now, 1)
      }, {
        side:'other', name:data.name, avatar:data.avatarChar, colorClass:data.colorClass,
        content: rd.reply.text,
        time: addMin(now, 1),
        mark: markMap[(round - 1) % 3],
        markLabel: rd.reply.markLabel,
        tags: rd.reply.tags
      }, 1100 + Math.random()*600).then(() => {
        round = Math.min(round + 1, rounds.length);
        renderAside(getActiveRound());
        flashAsideHint();
        // 未读红点 -1
        const conv = CONV_LIST.find(c => c.id === activeConvId);
        if (conv && conv.unread > 0) { conv.unread = 0; renderConvList(); }
      });
    } else {
      // 无剧本客户兜底
      setTimeout(() => {
        wcMsg.appendChild(WC.message({
          side:'other', name: data ? data.name : '客户', avatar: data ? data.avatarChar : '?',
          colorClass: data ? data.colorClass : 'c1',
          content:'好的，我再看看。', time:nowHM()
        }));
        WC.scrollBottom(wcMsg);
      }, 800);
    }
  }

  function flashAsideHint() {
    const c = document.querySelector('.wc-aside');
    if (!c) return;
    c.classList.add('is-pulse');
    setTimeout(() => c.classList.remove('is-pulse'), 1100);
  }

  function nowHM() {
    const d = new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  function addMin(hm, n) {
    const [h,m] = hm.split(':').map(Number);
    const t = h*60 + m + n;
    return `${String(Math.floor(t/60)%24).padStart(2,'0')}:${String(t%60).padStart(2,'0')}`;
  }

  // ---------- 7. 事件绑定 ----------
  wcSendBtn.addEventListener('click', sendUserMessage);
  wcInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendUserMessage();
    }
  });

  // 一键接管
  document.getElementById('btnTakeover').addEventListener('click', () => {
    const t = document.getElementById('toastTakeover');
    t.classList.add('is-show');
    setTimeout(() => t.classList.remove('is-show'), 3200);
    // 顶栏视觉变化
    document.querySelector('.wc-chat-header').classList.add('is-takeover');
    document.querySelector('.wc-foot-tip').innerHTML = '<b style="color:#0EA5E9">人工接管中</b> · AI 仅做后台辅助分析';
  });

  bootstrap();
  </script>

</body>
</html>
