<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../../shared/favicon.svg">
  <title>场景5 · 客户个性化数据应答 - AI-Sale Demo</title>
  <link rel="stylesheet" href="../../shared/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .data-page { display: flex; gap: 20px; height: calc(100vh - 65px); }
    .customer-sidebar {
      width: 280px; flex-shrink: 0;
      background: white; border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200); overflow: hidden;
      display: flex; flex-direction: column;
    }
    .customer-sidebar-header {
      padding: 16px; border-bottom: 1px solid var(--gray-200);
      background: var(--gray-50);
    }
    .customer-sidebar-header h3 { font-size: 14px; font-weight: 600; color: var(--gray-700); }
    .customer-list { flex: 1; overflow-y: auto; }
    .customer-item {
      padding: 14px 16px; cursor: pointer;
      border-bottom: 1px solid var(--gray-100);
      transition: all 0.2s; display: flex; align-items: center; gap: 10px;
    }
    .customer-item:hover { background: var(--gray-50); }
    .customer-item.active { background: #EFF6FF; border-left: 3px solid var(--primary); }
    .customer-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; flex-shrink: 0;
    }
    .customer-info { flex: 1; min-width: 0; }
    .customer-name { font-size: 14px; font-weight: 500; color: var(--gray-800); }
    .customer-meta { font-size: 12px; color: var(--gray-400); margin-top: 2px; }

    .data-main { flex: 1; display: flex; flex-direction: column; gap: 16px; overflow-y: auto; padding-bottom: 24px; }
    .profile-card {
      background: white; border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200); padding: 20px;
    }
    .profile-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
      padding-bottom: 16px; border-bottom: 1px solid var(--gray-100);
    }
    .profile-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white; display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700;
    }
    .profile-title h2 { font-size: 18px; font-weight: 600; }
    .profile-title p { font-size: 13px; color: var(--gray-500); margin-top: 2px; }

    .query-btns {
      display: flex; gap: 10px; flex-wrap: wrap;
    }
    .query-btn {
      padding: 10px 18px; border-radius: var(--radius-md);
      border: 1px solid var(--gray-300); background: white;
      font-size: 13px; color: var(--gray-600); cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .query-btn:hover, .query-btn.active {
      border-color: var(--primary); color: var(--primary);
      background: #EFF6FF;
    }

    .result-area { min-height: 200px; }
    .result-loading {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 40px; color: var(--gray-400); font-size: 14px;
    }
    .result-card {
      background: white; border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200); padding: 20px;
      animation: fadeIn 0.3s ease;
    }
    .result-card-title {
      font-size: 15px; font-weight: 600; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .result-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px;
    }
    .result-item {
      background: var(--gray-50); border-radius: var(--radius-md); padding: 12px;
    }
    .result-item-label { font-size: 12px; color: var(--gray-400); margin-bottom: 4px; }
    .result-item-value { font-size: 14px; font-weight: 600; color: var(--gray-800); }

    .timeline { position: relative; padding-left: 20px; }
    .timeline::before {
      content: ''; position: absolute; left: 5px; top: 0; bottom: 0;
      width: 2px; background: var(--gray-200);
    }
    .timeline-item { position: relative; margin-bottom: 14px; }
    .timeline-item::before {
      content: ''; position: absolute; left: -18px; top: 4px;
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--primary); border: 2px solid white;
    }
    .timeline-time { font-size: 12px; color: var(--gray-400); margin-bottom: 2px; }
    .timeline-text { font-size: 13px; color: var(--gray-700); }

    .badge-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .badge-blue { background: #DBEAFE; color: #1E40AF; }
    .badge-green { background: #D1FAE5; color: #065F46; }
    .badge-orange { background: #FEF3C7; color: #92400E; }
    .badge-red { background: #FEE2E2; color: #991B1B; }
  </style>
</head>
<body class="scene-page">
  <div id="scene-nav"></div>

  <div class="container data-page">
    <!-- 左侧客户列表 -->
    <aside class="customer-sidebar">
      <div class="customer-sidebar-header">
        <h3><i class="fas fa-users" style="margin-right:6px;color:var(--primary)"></i>客户列表</h3>
      </div>
      <div class="customer-list" id="customerList"></div>
    </aside>

    <!-- 右侧主区域 -->
    <main class="data-main" id="dataMain">
      <!-- 客户档案 -->
      <div class="profile-card" id="profileCard">
        <div class="profile-header">
          <div class="profile-avatar" id="profileAvatar">张</div>
          <div class="profile-title">
            <h2 id="profileName">张建国 · 川香阁连锁</h2>
            <p id="profileMeta">餐饮连锁 · 3家门店 · 跟进中 · 销售：李明</p>
          </div>
          <div style="margin-left:auto;display:flex;gap:8px">
            <span class="badge-pill badge-blue" id="profileStage">跟进中</span>
            <span class="badge-pill badge-green" id="profileLevel">A级</span>
          </div>
        </div>
        <div class="result-grid" id="profileGrid">
          <div class="result-item"><div class="result-item-label">联系人</div><div class="result-item-value" id="pContact">张建国 138****5678</div></div>
          <div class="result-item"><div class="result-item-label">所属行业</div><div class="result-item-value" id="pIndustry">川菜连锁</div></div>
          <div class="result-item"><div class="result-item-label">门店规模</div><div class="result-item-value" id="pScale">3家门店，日均500单</div></div>
          <div class="result-item"><div class="result-item-label">意向机型</div><div class="result-item-value" id="pModel">YC-2000 × 3</div></div>
          <div class="result-item"><div class="result-item-label">预计成交</div><div class="result-item-value" id="pAmount">12.8万</div></div>
          <div class="result-item"><div class="result-item-label">最近联系</div><div class="result-item-value" id="pLast">2026-05-18</div></div>
        </div>
      </div>

      <!-- 快捷查询 -->
      <div class="profile-card">
        <div class="result-card-title" style="margin-bottom:14px">
          <i class="fas fa-bolt" style="color:var(--warning)"></i> 快捷数据查询
          <span style="font-size:12px;color:var(--gray-400);font-weight:400;margin-left:auto">对接 ERP / WMS / CRM 系统</span>
        </div>
        <div class="query-btns" id="queryBtns">
          <button class="query-btn active" data-query="order"><i class="fas fa-file-invoice"></i> 订单状态</button>
          <button class="query-btn" data-query="ship"><i class="fas fa-truck"></i> 发货进度</button>
          <button class="query-btn" data-query="service"><i class="fas fa-wrench"></i> 售后记录</button>
          <button class="query-btn" data-query="trial"><i class="fas fa-utensils"></i> 试菜排期</button>
          <button class="query-btn" data-query="payment"><i class="fas fa-credit-card"></i> 回款情况</button>
        </div>
      </div>

      <!-- 查询结果 -->
      <div class="result-area" id="resultArea"></div>
    </main>
  </div>

  <script src="../../shared/js/app.js"></script>
  <script>
    initNav('客户个性化数据应答', '客户运营', 'tag-green');

    const customers = [
      { id: 1, name: '张建国', company: '川香阁连锁', industry: '川菜连锁', scale: '3家门店，日均500单', model: 'YC-2000 × 3', amount: '12.8万', stage: '跟进中', level: 'A级', contact: '138****5678', last: '2026-05-18', sales: '李明', avatar: '张' },
      { id: 2, name: '王小丽', company: '美味食堂', industry: '企业食堂', scale: '1家，日均800人', model: 'YC-3000 × 2', amount: '15.6万', stage: '已成交', level: 'S级', contact: '139****1234', last: '2026-05-19', sales: '张强', avatar: '王' },
      { id: 3, name: '刘大伟', company: '老街烧烤', industry: '烧烤夜宵', scale: '2家门店', model: 'YC-1000 × 2', amount: '6.5万', stage: '试菜中', level: 'B级', contact: '137****9876', last: '2026-05-15', sales: '李明', avatar: '刘' },
      { id: 4, name: '陈美华', company: '悦来快餐', industry: '快餐连锁', scale: '5家门店', model: 'YC-2000 × 5', amount: '22.0万', stage: '报价中', level: 'A级', contact: '136****3456', last: '2026-05-17', sales: '张强', avatar: '陈' },
      { id: 5, name: '赵铁军', company: '军工食堂', industry: '单位食堂', scale: '1家，日均1200人', model: 'YC-3000 × 3', amount: '24.5万', stage: '已成交', level: 'S级', contact: '135****7890', last: '2026-05-20', sales: '王芳', avatar: '赵' },
      { id: 6, name: '孙晓燕', company: '燕记面馆', industry: '粉面快餐', scale: '1家门店', model: 'YC-1000 × 1', amount: '3.5万', stage: '沉睡', level: 'C级', contact: '134****2468', last: '2026-04-10', sales: '李明', avatar: '孙' },
    ];

    const mockData = {
      order: {
        title: '📋 订单状态',
        items: [
          { label: '订单编号', value: 'YC-20260518-001' },
          { label: '下单时间', value: '2026-05-18 14:30' },
          { label: '订单金额', value: '¥128,000' },
          { label: '付款状态', value: '<span class="badge-pill badge-green">已付定金 30%</span>' },
          { label: '产品明细', value: 'YC-2000 × 3台 + 操作台 × 3 + 智能调料机 × 1' },
          { label: '合同状态', value: '<span class="badge-pill badge-blue">已签署</span>' },
        ]
      },
      ship: {
        title: '🚚 发货进度',
        items: [
          { label: '发货单号', value: 'SF20260519001' },
          { label: '物流公司', value: '顺丰快运' },
          { label: '当前状态', value: '<span class="badge-pill badge-orange">运输中</span>' },
          { label: '预计到达', value: '2026-05-22' },
          { label: '发货明细', value: '第1批：YC-2000 × 2台（已发出）' },
          { label: '下一批次', value: '第2批：YC-2000 × 1台 + 配件（待发）' },
        ]
      },
      service: {
        title: '🔧 售后记录',
        items: [
          { label: '保修期限', value: '2026-05-18 至 2029-05-18（3年）' },
          { label: '服务次数', value: '0 次' },
          { label: '最近服务', value: '暂无' },
          { label: '待处理工单', value: '<span class="badge-pill badge-green">无</span>' },
          { label: '专属技师', value: '周师傅 159****1122' },
          { label: '下次巡检', value: '2026-08-18' },
        ],
        timeline: [
          { time: '2026-05-18', text: '设备安装完成，客户签收' },
          { time: '2026-05-17', text: '上门安装预约确认' },
        ]
      },
      trial: {
        title: '🍳 试菜排期',
        items: [
          { label: '试菜状态', value: '<span class="badge-pill badge-green">已完成</span>' },
          { label: '试菜日期', value: '2026-05-10' },
          { label: '试菜地点', value: '杭州市西湖区试菜中心' },
          { label: '试菜菜品', value: '宫保鸡丁、麻婆豆腐、鱼香肉丝' },
          { label: '客户评价', value: '⭐⭐⭐⭐⭐ 非常满意，出菜口味稳定' },
          { label: '陪同销售', value: '李明' },
        ]
      },
      payment: {
        title: '💳 回款情况',
        items: [
          { label: '合同总额', value: '¥128,000' },
          { label: '已回款', value: '¥38,400（30%定金）' },
          { label: '待回款', value: '¥89,600' },
          { label: '回款进度', value: '<div style="width:100%;height:8px;background:var(--gray-200);border-radius:4px;margin-top:4px"><div style="width:30%;height:100%;background:var(--success);border-radius:4px"></div></div>' },
          { label: '下次回款', value: '发货前支付 50%（¥64,000）' },
          { label: '尾款', value: '验收后 7 日内支付 20%（¥25,600）' },
        ]
      }
    };

    let currentCustomer = customers[0];
    let currentQuery = 'order';

    function renderCustomerList() {
      const list = document.getElementById('customerList');
      list.innerHTML = customers.map(c => `
        <div class="customer-item ${c.id === currentCustomer.id ? 'active' : ''}" data-id="${c.id}">
          <div class="customer-avatar">${c.avatar}</div>
          <div class="customer-info">
            <div class="customer-name">${c.name} · ${c.company}</div>
            <div class="customer-meta">${c.industry} · ${c.stage}</div>
          </div>
        </div>
      `).join('');

      list.querySelectorAll('.customer-item').forEach(item => {
        item.addEventListener('click', () => {
          const id = parseInt(item.dataset.id);
          currentCustomer = customers.find(c => c.id === id);
          renderProfile();
          renderResult();
        });
      });
    }

    function renderProfile() {
      document.getElementById('profileAvatar').textContent = currentCustomer.avatar;
      document.getElementById('profileName').textContent = `${currentCustomer.name} · ${currentCustomer.company}`;
      document.getElementById('profileMeta').textContent = `${currentCustomer.industry} · ${currentCustomer.scale} · ${currentCustomer.stage} · 销售：${currentCustomer.sales}`;
      document.getElementById('profileStage').textContent = currentCustomer.stage;
      document.getElementById('profileLevel').textContent = currentCustomer.level;
      document.getElementById('pContact').textContent = `${currentCustomer.name} ${currentCustomer.contact}`;
      document.getElementById('pIndustry').textContent = currentCustomer.industry;
      document.getElementById('pScale').textContent = currentCustomer.scale;
      document.getElementById('pModel').textContent = currentCustomer.model;
      document.getElementById('pAmount').textContent = currentCustomer.amount;
      document.getElementById('pLast').textContent = currentCustomer.last;

      renderCustomerList();
    }

    function renderResult() {
      const area = document.getElementById('resultArea');
      area.innerHTML = `
        <div class="result-loading">
          <span class="loading-dot"></span>
          <span class="loading-dot" style="animation-delay:0.2s"></span>
          <span class="loading-dot" style="animation-delay:0.4s"></span>
          <span>正在从 ERP 系统查询数据...</span>
        </div>
      `;

      setTimeout(() => {
        const data = mockData[currentQuery];
        let html = `<div class="result-card">`;
        html += `<div class="result-card-title">${data.title}</div>`;
        html += `<div class="result-grid">`;
        data.items.forEach(item => {
          html += `
            <div class="result-item">
              <div class="result-item-label">${item.label}</div>
              <div class="result-item-value">${item.value}</div>
            </div>
          `;
        });
        html += `</div>`;

        if (data.timeline) {
          html += `<div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--gray-100)">`;
          html += `<div style="font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:10px">📅 历史记录</div>`;
          html += `<div class="timeline">`;
          data.timeline.forEach(t => {
            html += `
              <div class="timeline-item">
                <div class="timeline-time">${t.time}</div>
                <div class="timeline-text">${t.text}</div>
              </div>
            `;
          });
          html += `</div></div>`;
        }

        html += `</div>`;
        area.innerHTML = html;
      }, 600);
    }

    // 绑定查询按钮
    document.getElementById('queryBtns').addEventListener('click', e => {
      const btn = e.target.closest('.query-btn');
      if (!btn) return;
      document.querySelectorAll('.query-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentQuery = btn.dataset.query;
      renderResult();
    });

    renderCustomerList();
    renderProfile();
    renderResult();
  </script>
</body>
</html>
