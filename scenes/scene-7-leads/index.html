<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../../shared/favicon.svg">
  <title>场景7：线索智能初筛评级</title>
  <link rel="stylesheet" href="../../shared/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="scene-page">
  <nav class="scene-nav" id="scene-nav"></nav>

  <main class="scene-content">
    <!-- 上传区 -->
    <div class="data-card" style="text-align:center;padding:40px;margin-bottom:20px;border:2px dashed var(--gray-300);cursor:pointer" onclick="document.getElementById('file-input').click()">
      <div style="width:64px;height:64px;background:var(--gray-100);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <i class="fas fa-cloud-upload-alt" style="font-size:24px;color:var(--primary)"></i>
      </div>
      <h3 style="font-size:16px;font-weight:600;margin-bottom:8px">上传线索 Excel/CSV</h3>
      <p style="font-size:13px;color:var(--gray-500)">拖拽文件到此处，或点击上传</p>
      <input type="file" id="file-input" style="display:none" accept=".csv,.xlsx,.xls" onchange="handleFile(this)">
    </div>

    <!-- 演示按钮 -->
    <div style="text-align:center;margin-bottom:24px">
      <button class="scene-btn" onclick="loadDemoData()">
        <i class="fas fa-play" style="font-size:12px"></i> 加载演示数据（50条线索）
      </button>
    </div>

    <!-- 统计面板 -->
    <div id="stats-panel" style="display:none;margin-bottom:20px">
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px">
        <div style="text-align:center;padding:16px;background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-200)">
          <div style="font-size:28px;font-weight:700;color:var(--gray-800)" id="stat-total">50</div>
          <div style="font-size:12px;color:var(--gray-500)">总线索</div>
        </div>
        <div style="text-align:center;padding:16px;background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-200)">
          <div style="font-size:28px;font-weight:700;color:var(--success)" id="stat-s">8</div>
          <div style="font-size:12px;color:var(--gray-500)">S 级高意向</div>
        </div>
        <div style="text-align:center;padding:16px;background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-200)">
          <div style="font-size:28px;font-weight:700;color:var(--primary)" id="stat-a">15</div>
          <div style="font-size:12px;color:var(--gray-500)">A 级中意向</div>
        </div>
        <div style="text-align:center;padding:16px;background:white;border-radius:var(--radius-lg);border:1px solid var(--warning)">
          <div style="font-size:28px;font-weight:700;color:var(--warning)" id="stat-b">18</div>
          <div style="font-size:12px;color:var(--gray-500)">B 级低意向</div>
        </div>
        <div style="text-align:center;padding:16px;background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-200)">
          <div style="font-size:28px;font-weight:700;color:var(--gray-400)" id="stat-c">9</div>
          <div style="font-size:12px;color:var(--gray-500)">C 级无效</div>
        </div>
      </div>

      <!-- 筛选 -->
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="quick-tag" onclick="filterLeads('all')" style="background:var(--primary);color:white;border-color:var(--primary)">全部</button>
        <button class="quick-tag" onclick="filterLeads('S')">S 级</button>
        <button class="quick-tag" onclick="filterLeads('A')">A 级</button>
        <button class="quick-tag" onclick="filterLeads('B')">B 级</button>
        <button class="quick-tag" onclick="filterLeads('C')">C 级</button>
        <button class="scene-btn" style="margin-left:auto" onclick="exportLeads()">
          <i class="fas fa-download" style="font-size:12px"></i> 导出结果
        </button>
      </div>

      <!-- 表格 -->
      <div style="background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-200);overflow:hidden">
        <table class="demo-table" id="leads-table">
          <thead>
            <tr>
              <th>线索编号</th>
              <th>来源</th>
              <th>咨询内容</th>
              <th>AI 评级</th>
              <th>标签</th>
              <th>AI 判定理由</th>
              <th>建议动作</th>
            </tr>
          </thead>
          <tbody id="leads-tbody"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="../../shared/js/app.js"></script>
  <script>
    initNav('线索智能初筛评级', '客户运营', 'tag-green');

    let allLeads = [];

    const demoLeads = [
      { id: 'L001', source: '抖音私信', content: '我开火锅店的，200平，想了解下智能炒菜机，什么时候能上门试菜？', grade: 'S', tags: ['火锅','200平','高意向','急单'], reason: '明确提到火锅店→行业明确；提到200平→规模可估；主动问试菜→高意向信号；问什么时候能→急迫感', action: '立即分配给资深销售，当天联系' },
      { id: 'L002', source: '百度推广', content: '智能炒菜机多少钱？有联系方式吗？', grade: 'A', tags: ['询价','中意向'], reason: '主动询价，但未透露场景信息，需进一步挖掘', action: '电话回访，了解场景需求' },
      { id: 'L003', source: '展会', content: '我们公司食堂想了解一下，500人左右用餐', grade: 'S', tags: ['食堂','500人','大项目'], reason: '明确企业食堂场景，500人规模可观，属于高价值客户', action: '安排方案经理上门对接' },
      { id: 'L004', source: '转介绍', content: '朋友推荐的，我开了一个快餐店，想先看看', grade: 'A', tags: ['快餐','转介绍'], reason: '转介绍信任度高，但仅说"先看看"，意向中等', action: '发送案例+邀请试菜' },
      { id: 'L005', source: '抖音评论', content: '这机器能炒饭吗？', grade: 'B', tags: ['低意向','信息不全'], reason: '问题简单，未透露任何场景信息，可能只是好奇', action: '简单回复后观察是否继续互动' },
      { id: 'L006', source: '官网留言', content: '您好，我想咨询一下产品的详细参数和报价，我这边是连锁餐饮，计划采购10台', grade: 'S', tags: ['连锁','批量采购','10台'], reason: '连锁客户+批量采购10台，超高价值线索', action: '立即升级为大客户专案，总监亲自跟进' },
      { id: 'L007', source: '电话', content: '你们机器保修多久？坏了怎么办？', grade: 'B', tags: ['售后咨询','低意向'], reason: '只问售后，未涉及购买意向，可能处于早期了解阶段', action: '发送售后政策，标记长期跟进' },
      { id: 'L008', source: '抖音私信', content: '我在上海，想开个川菜馆，300平，预算10万以内，推荐一下', grade: 'S', tags: ['川菜','300平','有预算'], reason: '明确场景+面积+预算，信息完整度高，高意向', action: '当天联系，发送川菜馆方案+案例' },
      { id: 'L009', source: '百度推广', content: '智能炒菜机是不是骗人的？真的有用吗？', grade: 'C', tags: ['质疑','无效'], reason: '持怀疑态度，且未透露任何购买意向，转化概率极低', action: '暂不跟进，留作观察' },
      { id: 'L010', source: '转介绍', content: '我是开酒店的，想改造厨房，400平左右，能安排人来看现场吗？', grade: 'S', tags: ['酒店','400平','现场勘察'], reason: '酒店客户+主动要求现场勘察，已进入评估期', action: '安排工程师上门测量，同步发送酒店案例' },
      { id: 'L011', source: '展会', content: '了解一下', grade: 'C', tags: ['信息不全','无效'], reason: '仅有"了解一下"四个字，无任何有效信息', action: '发送产品册，标记沉睡' },
      { id: 'L012', source: '抖音评论', content: '这个比XX品牌贵啊', grade: 'B', tags: ['比价','竞品提及'], reason: '主动提及竞品并比价，说明在对比阶段，有机会转化', action: '发送竞品对比资料' },
    ];

    /** 来源类型判定及转化率权重 */
    const SOURCE_WEIGHTS = {
      '百度推广': { type:'投放', weight:-1, convRate:'4.4%', desc:'市场投放来源，企业转化率低（4.4%）' },
      '抖音私信': { type:'投放', weight:-1, convRate:'4.4%', desc:'市场投放来源，企业转化率低（4.4%）' },
      '抖音评论': { type:'投放', weight:-1, convRate:'4.4%', desc:'市场投放来源，企业转化率低（4.4%）' },
      '转介绍':   { type:'自拓', weight:+1, convRate:'12.6%', desc:'自有渠道来源，企业转化率较高（12.6%）' },
      '展会':     { type:'自拓', weight:+1, convRate:'12.6%', desc:'自有渠道来源，企业转化率较高（12.6%）' },
      '电话':     { type:'自拓', weight:0,  convRate:'12.6%', desc:'需进一步确认来源' },
      '官网留言': { type:'自拓', weight:0,  convRate:'12.6%', desc:'自有渠道来源，企业转化率较高（12.6%）' }
    };

    /** 来源调整评级 */
    function adjustGradeBySource(baseGrade, source) {
      const sw = SOURCE_WEIGHTS[source] || { weight:0 };
      const gradeOrder = ['C','B','A','S'];
      const idx = gradeOrder.indexOf(baseGrade);
      if (idx === -1) return baseGrade;
      const newIdx = Math.max(0, Math.min(3, idx + sw.weight));
      return gradeOrder[newIdx];
    }

    /** 检查是否需要标记偏差提醒 */
    function getSourceWarning(grade, source, tags) {
      const sw = SOURCE_WEIGHTS[source];
      if (!sw) return null;
      // 投放线索获评 S 但未关联企业 → 待验证
      if (sw.type === '投放' && grade === 'S' && !tags.includes('已关联企业')) {
        return { level:'warn', text:'⚠ 待验证：投放来源 S 级但未关联企业，建议核实后定级' };
      }
      // 自拓线索获评 C 但来源优质 → 建议重新评估
      if (sw.type === '自拓' && grade === 'C') {
        return { level:'info', text:'ℹ 建议重新评估：自拓来源线索，企业转化率较高（12.6%）' };
      }
      return null;
    }

    function loadDemoData() {
      // 补充到 50 条
      allLeads = [...demoLeads];
      const grades = ['S','S','A','A','A','B','B','B','C'];
      const sources = ['抖音私信','百度推广','展会','转介绍','官网留言','电话'];
      const types = ['火锅店','快餐店','食堂','川菜馆','酒店','创业店'];
      const contents = [
        '想了解一下智能炒菜机，适合快餐店用吗？',
        '我们食堂有800人用餐，推荐什么配置？',
        '机器能做湘菜吗？口味怎么样？',
        '开个200平的小饭店，预算5万，够吗？',
        '和XX品牌比，你们优势在哪？',
        '能上门演示吗？我想看看实际效果',
        '售后服务怎么样？质保多久？',
        '我打算开连锁店，能谈代理价吗？',
        '机器耗电量大吗？一个月电费多少？',
        '菜谱能自己添加吗？',
      ];

      for (let i = 13; i <= 50; i++) {
        const baseGrade = grades[Math.floor(Math.random() * grades.length)];
        const source = sources[Math.floor(Math.random() * sources.length)];
        const finalGrade = adjustGradeBySource(baseGrade, source);
        const sw = SOURCE_WEIGHTS[source] || {};
        const tags = [types[Math.floor(Math.random() * types.length)]];
        if (sw.type === '投放') tags.push('投放流量');
        else if (sw.type === '自拓') tags.push('自拓线索');
        if (finalGrade === 'S') tags.push('高意向');
        else if (finalGrade === 'A') tags.push('中意向');
        else tags.push('低意向');

        let reason = `基于咨询内容和关键词判定为 ${baseGrade} 级`;
        if (sw.weight === -1) reason += `；来源（${source}）为市场投放，评级下调一档`;
        if (sw.weight === 1) reason += `；来源（${source}）为销售自拓，评级上调一档`;

        allLeads.push({
          id: `L${String(i).padStart(3, '0')}`,
          source: source,
          content: contents[Math.floor(Math.random() * contents.length)],
          grade: finalGrade,
          tags: tags,
          reason: reason,
          action: finalGrade === 'S' ? '立即分配给资深销售' : finalGrade === 'A' ? '电话回访，深挖需求' : '发送资料，长期跟进'
        });
      }

      document.getElementById('stats-panel').style.display = 'block';
      renderTable(allLeads);
    }

    function renderTable(leads) {
      const tbody = document.getElementById('leads-tbody');
      tbody.innerHTML = leads.map(l => {
        const gradeColors = { S: 'status-green', A: 'status-blue', B: 'status-yellow', C: 'status-gray' };
        const warning = getSourceWarning(l.grade, l.source, l.tags);
        const warningBadge = warning
          ? `<span class="tag" style="margin:2px;background:${warning.level === 'warn' ? '#FEF3C7' : '#DBEAFE'};color:${warning.level === 'warn' ? '#92400E' : '#1E40AF'};border:none">${warning.text}</span>`
          : '';
        return `
          <tr>
            <td><strong>${l.id}</strong></td>
            <td>${l.source}${SOURCE_WEIGHTS[l.source] ? '<br><span style="font-size:11px;color:var(--gray-400)">' + SOURCE_WEIGHTS[l.source].convRate + '</span>' : ''}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.content}">${l.content}</td>
            <td><span class="status-badge ${gradeColors[l.grade]}">${l.grade} 级</span>${warningBadge}</td>
            <td>${l.tags.map(t => `<span class="tag" style="margin:2px">${t}</span>`).join('')}</td>
            <td style="font-size:12px;color:var(--gray-600);max-width:250px">${l.reason}</td>
            <td style="font-size:13px">${l.action}</td>
          </tr>
        `;
      }).join('');
    }

    function filterLeads(grade) {
      if (grade === 'all') {
        renderTable(allLeads);
      } else {
        renderTable(allLeads.filter(l => l.grade === grade));
      }
    }

    function exportLeads() {
      exportCSV(allLeads.map(l => ({
        线索编号: l.id,
        来源: l.source,
        咨询内容: l.content,
        AI评级: l.grade,
        标签: l.tags.join('/'),
        判定理由: l.reason,
        建议动作: l.action
      })), '线索评级结果.csv');
    }

    function handleFile(input) {
      toast('文件解析功能演示中，请使用"加载演示数据"按钮', 'info');
      input.value = '';
    }

    function toast(message, type) {
      const div = document.createElement('div');
      div.style.cssText = `position:fixed;top:20px;right:20px;padding:12px 20px;background:#2563EB;color:white;border-radius:8px;font-size:14px;z-index:9999;`;
      div.textContent = message;
      document.body.appendChild(div);
      setTimeout(() => div.remove(), 3000);
    }

    function exportCSV(data, filename) {
      const headers = Object.keys(data[0]);
      const csv = [headers.join(','), ...data.map(row => headers.map(h => `"${String(row[h]).replace(/"/g, '""')}"`).join(','))].join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
    }
  </script>
</body>
</html>
