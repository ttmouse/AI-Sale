id$('p-step').textContent=isEnd?'完成':done+' / '+Math.max(total,done+1);
if(id$('p-title'))id$('p-title').textContent=done+' 轮';
id$('p-bar').style.width=isEnd?'100%':Math.min(done/Math.max(total,1)*100,95)+'%';}

function updateNavStats(){id$('nav-sessions').textContent=state.sessions;id$('nav-best').textContent=state.bestRate>0?state.bestRate+'%':'--';}

function renderSelectors(){
var cList=id$('cust-list');cList.innerHTML='';
CUSTOMERS.forEach(function(c){var b=document.createElement('button');b.className='tr-opt'+(c.id===state.customer?' active':'');
b.innerHTML='<span class="ic" style="background:'+c.color+'">'+c.emoji+'</span><span>'+c.name+'</span>';
b.onclick=function(){state.customer=c.id;renderSelectors();updateDetail();};cList.appendChild(b);});
var sList=id$('stage-list');sList.innerHTML='';
STAGES.forEach(function(s){var b=document.createElement('button');b.className='tr-opt'+(s.id===state.stage?' active':'');
b.innerHTML='<span style="font-size:.875rem;width:16px;text-align:center">'+s.icon+'</span><span>'+s.name+'</span>';
b.onclick=function(){state.stage=s.id;renderSelectors();updateDetail();};sList.appendChild(b);});
id$('load-btn').disabled=!getCase();}

document.addEventListener('DOMContentLoaded',function(){renderSelectors();updateDetail();id$('load-btn').onclick=loadCase;});

</script></body></html>
