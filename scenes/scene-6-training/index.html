var id$=function(id){return document.getElementById(id);};var msgArea=id$("msg-area"),optGrid=id$("options-grid"),optArea=id$("options-area"),resultArea=id$("result-area");var state={customer:'newbie',stage:'icebreak',currentNode:null,history:[],sessions:0,bestRate:0,autoTimer:null};

function updateDetail(){var c=CASES_DATA[state.customer+'-'+state.stage],el=id$('case-detail');if(!c){el.innerHTML='<div style="font-size:.6875rem;color:#9CA3AF;text-align:center;padding:.5rem 0">暂无案例</div>';return;}
el.innerHTML='<div style="font-size:.75rem;font-weight:600;margin-bottom:.25rem">'+c.title+'</div><div class="tr-tags">'+c.tags.map(function(t){return'<span class="tr-tag">'+t+'</span>'}).join('')+'</div>';id$('load-btn').disabled=!c;}
function getCase(){return CASES_DATA[state.customer+'-'+state.stage];}

function loadCase(){
if(state.autoTimer){clearTimeout(state.autoTimer);state.autoTimer=null;}
var c=getCase();if(!c)return;
state.currentNode=c.root;state.history=[];msgArea.innerHTML='';resultArea.style.display='none';
id$('s-correct').textContent='0';id$('s-wrong').textContent='0';id$('s-total').textContent='0';id$('s-rate').textContent='0%';
id$('h-area').innerHTML='<div style="font-size:.6875rem;color:#9CA3AF;text-align:center;padding:.5rem 0">对话进行中</div>';
updateDetail();showNode(c.root);
var cust=CUSTOMERS.find(function(x){return x.id===state.customer;});
id$('head-icon').style.background=(cust&&cust.color)||'#6B7280';id$('head-icon').textContent=(cust&&cust.emoji)||'客';
id$('head-title').textContent=c.title;id$('head-sub').innerHTML='<span>树形对话 · 选择影响走向</span>';}

function showNode(node){
if(!node||!node.customer){showEnding();return;}
state.currentNode=node;
if(node.context){id$('scene-desc').style.display='flex';id$('step-desc').textContent=node.context;}
else{id$('scene-desc').style.display='none';}
var cust=CUSTOMERS.find(function(x){return x.id===state.customer;});
var d=document.createElement('div');d.className='tr-cust-msg';
d.innerHTML='<div class="tr-cust-avatar" style="background:'+((cust&&cust.color)||'#6B7280')+'">'+((cust&&cust.emoji)||'客')+'</div><div class="tr-cust-bubble">'+node.customer+'</div>';
msgArea.appendChild(d);msgArea.scrollTop=msgArea.scrollHeight;
if(node.options&&node.options.length>0){
optArea.style.display='block';optGrid.innerHTML='';
var cs={A:'#3B82F6',B:'#8B5CF6',C:'#F59E0B',D:'#EF4444'};
node.options.forEach(function(o){
var b=document.createElement('button');b.className='tr-option-btn';b.dataset.letter=o.letter;
b.innerHTML='<span class="tr-opt-letter" style="background:'+(cs[o.letter]||'#6B7280')+'">'+o.letter+'</span><span class="tr-opt-text">'+o.text+'</span>';
b.onclick=function(){selectOption(o,node);};optGrid.appendChild(b);});
resultArea.style.display='none';id$('step-label').textContent='第 '+(state.history.length+1)+' 轮 · 你的回应';
}else{showEnding();}updateProgress();}

function selectOption(option,node){
var btns=optGrid.querySelectorAll('.tr-option-btn');
for(var i=0;i<btns.length;i++)btns[i].onclick=null;
btns.forEach(function(b){b.classList.add('resolved');if(b.dataset.letter===option.letter)b.classList.add(option.level==='good'?'correct':'wrong');});
var sDiv=document.createElement('div');sDiv.className='tr-sales-msg';
sDiv.innerHTML='<div class="tr-sales-avatar">销</div><div class="tr-sales-bubble">'+option.text+'</div>';
msgArea.appendChild(sDiv);msgArea.scrollTop=msgArea.scrollHeight;

state.history.push({letter:option.letter,level:option.level,node:node});updateStats();
resultArea.style.display='block';
var bm={good:'👍 优秀选择',ok:'💡 可以更好',poor:'❌ 需要改进'},bc={good:'good',ok:'ok',poor:'poor'};
id$('result-badge').textContent=bm[option.level]||'分析';id$('result-badge').className='tr-result-badge '+(bc[option.level]||'ok');
id$('result-text').textContent=option.analysis;
var bestOpt=node.options&&node.options.find(function(o){return o.level==='good';});
if(bestOpt&&option.letter!==bestOpt.letter){id$('result-best').innerHTML='<strong>推荐回应：</strong>'+bestOpt.text;id$('result-best').style.display='block';}
else{id$('result-best').style.display='none';}
var actions=id$('result-actions');actions.innerHTML='';
if(option.next&&option.next.options&&option.next.options.length>0){
if(option.level==='poor'){
actions.innerHTML='<button class="tr-retry-btn" id="retry-btn">↻ 再试一次</button><div class="tr-next-dots"><span class="tr-ndot"></span><span class="tr-ndot" style="animation-delay:.3s"></span><span class="tr-ndot" style="animation-delay:.6s"></span></div>';
id$('retry-btn').onclick=function(){retryStep();};
state.autoTimer=setTimeout(function(){showNode(option.next);},3500);
}else{
actions.innerHTML='<div class="tr-next-dots"><span class="tr-ndot"></span><span class="tr-ndot" style="animation-delay:.3s"></span><span class="tr-ndot" style="animation-delay:.6s"></span><span style="font-size:.625rem;color:#9CA3AF">对话继续...</span></div>';
state.autoTimer=setTimeout(function(){showNode(option.next);},2500);}
}else{
if(option.reaction&&!option.next){var rc=CUSTOMERS.find(function(x){return x.id===state.customer;});var rd=document.createElement('div');rd.className='tr-cust-msg';rd.innerHTML='<div class="tr-cust-avatar" style="background:'+((rc&&rc.color)||'#6B7280')+'">'+((rc&&rc.emoji)||'客')+'</div><div class="tr-cust-bubble">'+option.reaction+'</div>';msgArea.appendChild(rd);msgArea.scrollTop=msgArea.scrollHeight;}
actions.innerHTML='<button class="tr-retry-btn" onclick="loadCase()">↻ 重新开始</button>';updateProgress(true);}
updateProgress();}

function retryStep(){
if(state.autoTimer){clearTimeout(state.autoTimer);state.autoTimer=null;}
var msgs=msgArea.querySelectorAll('.tr-sales-msg,.tr-cust-msg');
if(msgs.length>=2){msgs[msgs.length-1].remove();msgs[msgs.length-2].remove();}
state.history.pop();updateStats();
resultArea.style.display='none';id$('result-actions').innerHTML='';
var btns=optGrid.querySelectorAll('.tr-option-btn');
btns.forEach(function(b){b.classList.remove('resolved','correct','wrong');});
var node=state.currentNode;
btns.forEach(function(b){var l=b.dataset.letter;var o=node.options.find(function(x){return x.letter===l;});b.onclick=function(){selectOption(o,node);};});}

function showEnding(){
optArea.style.display='none';id$('scene-desc').style.display='none';
var total=state.history.length,bests=state.history.filter(function(h){return h.level==='good';}).length,rate=total>0?Math.round(bests/total*100):0;
if(rate>state.bestRate)state.bestRate=rate;state.sessions++;
var div=document.createElement('div');div.className='tr-summary';
div.innerHTML='<h3>🏆 对话结束</h3><div class="tr-summary-grid"><div class="tr-summary-item"><div class="v" style="color:'+(rate>=80?'#10B981':rate>=50?'#F59E0B':'#EF4444')+'">'+rate+'%</div><div class="l">正确率</div></div><div class="tr-summary-item"><div class="v" style="color:#2563EB">'+total+'</div><div class="l">总选择</div></div></div>';
if(rate<100){
var weak=state.history.filter(function(h){return h.level!=='good';});
div.innerHTML+='<div class="tr-summary-list">📌 <strong>值得回头练的：</strong><br>';
weak.forEach(function(h,i){div.innerHTML+=(i+1)+'. 第 '+(state.history.indexOf(h)+1)+' 轮（选了'+h.letter+'）<br>';});
div.innerHTML+='<br>💡 点击「重新开始」再试一次</div>';}else{div.innerHTML+='<div class="tr-summary-list">🎉 全部最佳！你已经掌握了这个场景。</div>';}
msgArea.innerHTML='';msgArea.appendChild(div);updateNavStats();}

function updateStats(){
var total=state.history.length,bests=state.history.filter(function(h){return h.level==='good';}).length,poors=state.history.filter(function(h){return h.level==='poor';}).length;
id$('s-correct').textContent=bests;id$('s-wrong').textContent=poors;id$('s-total').textContent=total;
id$('s-rate').textContent=total>0?Math.round(bests/total*100)+'%':'0%';
var area=id$('h-area');
if(state.history.length===0){area.innerHTML='<div style="font-size:.6875rem;color:#9CA3AF;text-align:center;padding:.5rem 0">等待开始</div>';return;}
var cm={A:'#3B82F6',B:'#8B5CF6',C:'#F59E0B',D:'#EF4444'};
area.innerHTML=state.history.map(function(h,i){var ic=h.level==='good'?'✓':h.level==='poor'?'✗':'→';var co=h.level==='good'?'#10B981':h.level==='poor'?'#EF4444':'#F59E0B';
return'<div class="tr-h-item"><span class="tr-h-letter" style="background:'+(cm[h.letter]||'#6B7280')+'">'+h.letter+'</span><span>第 '+(i+1)+' 轮</span><span style="margin-left:auto;color:'+co+';font-weight:600">'+ic+'</span></div>';}).join('');}

function updateProgress(isEnd){
var total=0,node=state.currentNode;while(node){total++;node=node.options&&node.options[0]?node.options[0].next:null;}
var done=state.history.length;
id$('p-step').textContent=isEnd?'完成':done+' / '+Math.max(total,done+1);
if(id$('p-title'))id$('p-title').textContent=done+' 轮';
id$('p-bar').style.width=isEnd?'100%':Math.min(done/Math.max(total,1)*100,95)+'%';}

function updateNavStats(){id$('nav-sessions').textContent=state.sessions;id$('nav-best').textContent=state.bestRate>0?state.bestRate+'%':'--';}

function renderSelectors(){
var cList=id$('cust-list');cList.innerHTML='';
CUSTOMERS.forEach(function(c){var b=document.createElement('button');b.className='tr-opt'+(c.id===state.customer?' active':'');
b.innerHTML='<span class="ic" style="background:'+c.color+'">'+c.emoji+'</span><span>'+c.name+'</span>';
b.onclick=function(){state.customer=c.id;renderSelectors();updateDetail();};cList.appendChild(b);});
var sList=id$('stage-list');sList.innerHTML='';
STAGES.forEach(function(s){var b=document.createElement('button');b.className='tr-opt'+(s.id===state.stage?' active':'');
b.innerHTML='<span style="font-size:.875rem;width:16px;text-align:center">'+s.icon+'</span><span>'+s.name+'</span>';
b.onclick=function(){state.stage=s.id;renderSelectors();updateDetail();};sList.appendChild(b);});
id$('load-btn').disabled=!getCase();}

document.addEventListener('DOMContentLoaded',function(){renderSelectors();updateDetail();id$('load-btn').onclick=loadCase;});

</script></body></html>
