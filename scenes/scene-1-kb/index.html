<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../../shared/favicon.svg">
  <title>场景1：销售随身智能知识库</title>
  <link rel="stylesheet" href="../../shared/css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="scene-page">
  <nav class="scene-nav" id="scene-nav"></nav>

  <main class="scene-content">
    <!-- 快捷场景入口 -->
    <div style="margin-bottom:16px">
      <div style="font-size:13px;color:var(--gray-500);margin-bottom:10px">快速场景入口：</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="quick-tag" onclick="ask('食堂场景推荐什么机型？')">食堂场景</button>
        <button class="quick-tag" onclick="ask('300平川菜馆，日均350单，推荐配置')">川菜馆配置</button>
        <button class="quick-tag" onclick="ask('YC-2000和竞品A对比')">竞品对比</button>
        <button class="quick-tag" onclick="ask('机器多久能回本？')">回本周期</button>
        <button class="quick-tag" onclick="ask('你们售后怎么保障？')">售后政策</button>
        <button class="quick-tag" onclick="ask('我是百度搜到你们的，想了解下智能炒菜机')" style="background:#FFFBEB;border-color:#FDE68A">来源归因（投放）</button>
        <button class="quick-tag" onclick="ask('朋友介绍来的，听说你们的机器不错')" style="background:#ECFDF5;border-color:#A7F3D0">来源归因（自拓）</button>
      </div>
    </div>

    <!-- 聊天区 -->
    <div class="chat-container" style="height:calc(100vh - 240px)">
      <div class="chat-messages" id="chat-messages">
        <div class="chat-message ai">
          <div class="chat-avatar ai">AI</div>
          <div class="chat-bubble">
            您好！我是您的智能厨具顾问 🍳<br><br>
            您可以问我：<br>
            • <strong>产品参数</strong>：某型号的功率、产能、尺寸<br>
            • <strong>场景适配</strong>：食堂/火锅/快餐推荐什么配置<br>
            • <strong>竞品对比</strong>：我们和 XX 品牌的差异<br>
            • <strong>报价咨询</strong>：不同配置的预算区间<br>
            • <strong>售后问题</strong>：质保、维修、培训
          </div>
        </div>
      </div>

      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chat-input" placeholder="输入您的问题..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="chat-send-btn" onclick="sendMessage()">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </main>

  <script src="../../shared/js/app.js"></script>
  <script>
    initNav('销售随身智能知识库', '销售赋能', 'tag-blue');

    const messagesEl = document.getElementById('chat-messages');
    const inputEl = document.getElementById('chat-input');

    // ===== 数据加载（从 JSON，替代硬编码 KB）=====
    let DB = { products: [], cases: [], faq: [], comparisons: [] };
    let dataReady = false;

    async function loadDB() {
      try {
        const [prods, cases, dict] = await Promise.all([
          fetch('../../data/products.json').then(r => r.json()),
          fetch('../../data/cases.json').then(r => r.json()),
          fetch('../../data/dict.json').then(r => r.json()),
        ]);
        DB.products = prods.products || [];
        DB.cases = cases.cases || [];
        DB.faq = prods.faq || [];
        DB.comparisons = prods.comparisons || [];
        // 构建快速查找索引
        DB.byModel = {};
        DB.products.forEach(p => { DB.byModel[p.id] = p; DB.byModel[p.name] = p; });
        dataReady = true;
      } catch (e) {
        console.warn('数据加载失败，使用降级文本', e);
        dataReady = false;
      }
    }

    // ===== 格式化工具 =====
    function fmtPrice(price) {
      if (!price) return '按需报价';
      return '¥' + (price / 10000).toFixed(2).replace(/\.?0+$/, '') + '万';
    }

    function fmtProductCard(p) {
      return `${p.name}\n` +
        `• 价格：${fmtPrice(p.price)}\n` +
        `• 功率：${p.power} | 产能：${p.throughput}\n` +
        `• 尺寸：${p.dimensions}\n` +
        `• 适用：${(p.scenes || []).join(' / ')}\n` +
        `• 亮点：${(p.highlights || []).join('、')}\n` +
        `• 质保：${p.warranty || '—'}`;
    }

    function fmtCaseCard(c) {
      return `【${c.name}】${c.type} · ${c.city}\n` +
        `• 设备：${(c.products || []).join('、')}\n` +
        `• 规模：${c.size} | 日均 ${c.dailyOrders} 单\n` +
        `• 投入：${fmtPrice(c.totalPrice)}\n` +
        `• 回本：${c.paybackMonths} 个月\n` +
        `• 证言："${c.quote}" — ${c.quoteFrom}\n` +
        `• 成效：${(c.highlights || []).join(' / ')}`;
    }

    // ===== 查询引擎（数据驱动）=====
    function findAnswer(text) {
      if (!dataReady) {
        return '⏳ 知识库加载中，请稍后再试…';
      }

      const lower = text.toLowerCase();

      // 1. 来源归因（保持原有逻辑）
      const sourceInfo = detectSource(text);
      if (sourceInfo) {
        return `【来源识别：${sourceInfo.source}流量】\n━━━━━━━━━━━━━━━━━━\n${sourceInfo.response}`;
      }

      // 2. 精确型号查询（匹配 ID 或产品名中的子串）
      const matchedProd = DB.products.find(p =>
        lower.includes(p.id.toLowerCase()) ||
        lower.includes(p.name.toLowerCase().replace(/[（(].*[）)]/, ''))
      );
      if (matchedProd) {
        let reply = `📋 ${fmtProductCard(matchedProd)}\n━━━━━━━━━━━━━━━━━━\n`;
        // 附带相关案例
        const relatedCases = DB.cases.filter(c =>
          c.products && c.products.some(p => p.includes(matchedProd.id.split('-')[0]))
        ).slice(0, 2);
        if (relatedCases.length) {
          reply += '\n📊 相关案例：\n' + relatedCases.map(c => fmtCaseCard(c)).join('\n━━━\n');
        }
        reply += '\n📄 数据来源：产品手册 / 案例库';
        return reply;
      }

      // 3. 场景推荐（按客户类型 + 场景关键词匹配）
      const sceneMatch = DB.products.filter(p =>
        (p.scenes || []).some(s => lower.includes(s)) ||
        (p.customerTypes || []).some(ct => lower.includes(ct))
      );
      if (sceneMatch.length > 0) {
        const top = sceneMatch.slice(0, 2);
        let reply = '🔍 根据您描述的场景，推荐以下配置：\n━━━━━━━━━━━━━━━━━━\n';
        reply += top.map((p, i) =>
          `方案 ${i + 1}：${fmtProductCard(p)}`
        ).join('\n━━━\n');
        // 引用同类型案例
        const sceneCases = DB.cases.filter(c =>
          top.some(p => c.products && c.products.some(cp => cp.includes(p.id.split('-')[0])))
        ).slice(0, 1);
        if (sceneCases.length) {
          reply += '\n━━━━━━━━━━━━━━━━━━\n📊 同类案例参考：\n';
          reply += fmtCaseCard(sceneCases[0]);
        }
        reply += '\n📄 数据来源：产品手册 / 案例库 #' + (sceneCases[0]?.id || '—');
        return reply;
      }

      // 4. 竞品对比
      if (lower.includes('比') || lower.includes('优势') || lower.includes('竞品') || lower.includes('对比')) {
        if (DB.comparisons.length) {
          let reply = '📊 核心竞争优势对比\n━━━━━━━━━━━━━━━━━━\n';
          reply += DB.comparisons.map(c =>
            `• ${c.item}：我们 ${c.our} | 竞品A ${c.competitorA} | 竞品B ${c.competitorB}`
          ).join('\n');
          reply += '\n\n📄 数据来源：产品对比表 v3.2';
          return reply;
        }
      }

      // 5. 回本周期估算
      if (lower.includes('回本') || lower.includes('多久') || lower.includes('回收') || lower.includes('周期')) {
        const fc = DB.cases.filter(c => c.paybackMonths).slice(0, 3);
        if (fc.length) {
          let reply = '📈 回本周期参考（基于真实案例）\n━━━━━━━━━━━━━━━━━━\n';
          reply += fc.map(c =>
            `• ${c.name}（${c.type}）：设备 ${fmtPrice(c.totalPrice)}，${c.paybackMonths} 个月回本` +
            (c.staffReduced ? `，后厨减少 ${c.staffReduced} 人` : '')
          ).join('\n');
          reply += '\n\n💡 平均回本月数：' +
            Math.round(fc.reduce((s, c) => s + c.paybackMonths, 0) / fc.length) + ' 个月';
          reply += '\n📄 数据来源：案例库';
          return reply;
        }
      }

      // 6. FAQ（售后 / 安装 / 质保等）
      if (lower.includes('售后') || lower.includes('质保') || lower.includes('保修') ||
          lower.includes('安装') || lower.includes('维修') || lower.includes('保障')) {
        const faqMatch = DB.faq.filter(f =>
          lower.includes('安装') ? f.q.includes('安装') :
          lower.includes('售后') || lower.includes('维修') ? f.q.includes('售后') :
          f.q.includes('回本') || f.q.includes('能做')
        );
        if (faqMatch.length) {
          return '❓ ' + faqMatch.map(f => `Q: ${f.q}\nA: ${f.a}`).join('\n\n━━━\n\n');
        }
      }

      // 7. 阶段定义查询
      if (lower.includes('P1') || lower.includes('P2') || lower.includes('P3') || lower.includes('P4') || lower.includes('P5') || lower.includes('P6') || lower.includes('P7') || lower.includes('阶段') || (lower.includes('漏斗') && !lower.includes('比')) || lower.includes('转化率')) {
        const stages = [
          { code: 'P1', label: '了解信息', desc: '客户初次接触，获取产品资料、了解基本功能。首触达→发资料→确认客户基本信息' },
          { code: 'P2', label: '收集需求', desc: '销售已获取客户场景信息（面积/单量/痛点）。需求采集→方案初步匹配→报价准备' },
          { code: 'P3', label: '确认合作', desc: '客户已试菜/看方案，进入合作意向确认。试菜跟进→方案细调→商务磋商' },
          { code: 'P4', label: '合同签署', desc: '双方达成一致，进入合同流程。条款确认→审批流转→首付款跟进' },
          { code: 'P5', label: '发货', desc: '合同签署完成，进入执行阶段。发货安排→物流跟踪→到货确认' },
          { code: 'P6', label: '已回款', desc: '全部款项（含尾款）已到账。对账确认→发票开具' },
          { code: 'P7', label: '已交付', desc: '设备安装调试+客户培训+菜谱录制完成。交付确认→售后对接' },
        ];
        return '📊 销售机会阶段（P1~P7 全链路漏斗）\n━━━━━━━━━━━━━━━━━━━━━━━━━\n\n' + stages.map(s =>
          `${s.code} ${s.label}：${s.desc}`
        ).join('\n\n') + '\n\n📄 数据来源：CRM/OA 业务定义 v1.0';
      }

      // 8. 退路
      return '抱歉，您的问题我当前知识库没有精确匹配。\n\n' +
        '您可以试试：\n' +
        '• 问具体型号：如"G3 什么参数？"\n' +
        '• 描述餐厅场景：如"团餐500人推荐什么？"\n' +
        '• 竞品对比：如"和美膳狮比怎么样？"\n' +
        '• 回本估算：如"多久能回本？"\n' +
        '• 阶段定义：如"P1 是什么意思？"\n\n' +
        '如果急需，可以转人工客服为您解答 🙋';
    }

    // ===== 来源归因策略（保持原有逻辑）=====
    const SOURCE_STRATEGIES = {
      '投放': {
        keywords: ['百度','广告','搜到','看到','推荐','推广','抖音'],
        response: '感谢您的关注！（公司背书）我们是优特科技集团旗下，30年技术沉淀，已服务全国3000+餐饮客户，包括老乡鸡、阿里食堂等标杆。<br><br>（信任建设）您是通过<b>%s</b>了解到的对吗？我们很重视每一位客户，能否先了解下您的餐厅类型和规模？我帮您匹配最适合的方案。'
      },
      '自拓': {
        keywords: ['朋友','介绍','同行','转介绍','展会','老客户'],
        response: '太好了！有熟客背书说明您已经了解过我们的基本实力。<br><br>（场景匹配）咱们直接聊需求，您这边是开新店还是老店升级？面积多大？日均大概多少单？我直接给您出方案。'
      }
    };

    function detectSource(text) {
      for (const [source, config] of Object.entries(SOURCE_STRATEGIES)) {
        for (const kw of config.keywords) {
          if (text.includes(kw)) return { source, response: config.response.replace('%s', kw) };
        }
      }
      return null;
    }

    // ===== UI 交互（保持不变）=====
    function ask(text) {
      inputEl.value = text;
      sendMessage();
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';

      messagesEl.appendChild(createMessageBubble(text, 'user'));
      scrollToBottom(messagesEl);
      messagesEl.appendChild(createLoadingBubble());
      scrollToBottom(messagesEl);

      mockDelay(600).then(() => {
        removeLoadingBubble();
        const reply = findAnswer(text);
        messagesEl.appendChild(createMessageBubble(reply, 'ai'));
        scrollToBottom(messagesEl);
      });
    }

    // 启动：预加载数据
    loadDB();

    // 简化的工具函数（内联版本）
    function createMessageBubble(content, sender) {
      const div = document.createElement('div');
      div.className = `chat-message ${sender}`;
      const avatarText = sender === 'ai' ? 'AI' : '我';
      div.innerHTML = `<div class="chat-avatar ${sender}">${avatarText}</div><div class="chat-bubble">${content.replace(/\n/g, '<br>')}</div>`;
      return div;
    }
    function createLoadingBubble() {
      const div = document.createElement('div');
      div.className = 'chat-message ai';
      div.id = 'loading-msg';
      div.innerHTML = `<div class="chat-avatar ai">AI</div><div class="chat-bubble"><span class="loading-dot"></span><span class="loading-dot" style="animation-delay:0.2s"></span><span class="loading-dot" style="animation-delay:0.4s"></span></div>`;
      return div;
    }
    function removeLoadingBubble() {
      const el = document.getElementById('loading-msg');
      if (el) el.remove();
    }
    function scrollToBottom(el) {
      el.scrollTop = el.scrollHeight;
    }
    function mockDelay(ms = 800) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
</body>
</html>
