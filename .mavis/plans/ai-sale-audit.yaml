version: 1
plan:
  name: 'AI-Sale 项目深度审计'
  max_concurrency: 3
  max_consecutive_failures: 2
  max_cycles: 3

tasks:
  - id: code-audit
    title: '代码架构审计'
    prompt: |
      审计 /Users/douba/Projects/AI-Sale 项目的代码架构，重点：

      1. **场景完整性**：统计 scenes/ 目录下所有场景，对照 docs/SCENES.md 和 docs/OPTIMIZATION.md，找出：
         - 哪些场景有代码但文档没覆盖
         - 哪些场景文档有但代码没实现
         - 场景 9/10/11（企微助手/企微聊天/销售助手）的代码质量和复杂度

      2. **代码复用率**：统计 shared/ 下的 CSS/JS 被各场景引用的情况，找出重复代码和可以抽取的公共组件

      3. **AI 层现状**：每个场景的「智能回复」是规则引擎还是 LLM？找到 findAnswer() / 话术推荐 / 意图识别的实际实现方式

      4. **技术债**：跨场景的一致性问题（如 smart_mapping.md 提到的路径陷阱）、硬编码数据、代码规范问题

      输出格式：
      - 每个问题的具体文件路径 + 行号
      - 问题严重度：🔴高 / 🟡中 / 🟢低
      - 简洁结论（一句话总结每个维度）

  - id: data-audit
    title: '数据层审计'
    prompt: |
      审计 /Users/douba/Projects/AI-Sale/data/ 目录下所有 JSON 文件：

      1. **文件清单**：列出所有 JSON 文件、文件大小、行数

      2. **字段完整性检查**（对照 smart_mapping.md 第三节的数据层结构笔记）：
         - products.json：是否含型号/功率/容量/适配菜系/定价/毛利/典型客户？
         - customers.json：是否含 customerId/行业/规模/阶段/负责销售？
         - dict.json：是否覆盖客户类型 12 类、设备品类 8 类？

      3. **数据量**：
         - products.json 有多少 SKU？目标 20+
         - customers.json 有多少客户？目标 30+
         - cases.json 有多少案例？目标 10+

      4. **数据真实度**：金额是否带千分位（¥123,456）？时间是否用相对时间？是否有模糊数据（如"500单"）？

      5. **场景引用**：各场景 HTML 是否正确引用 data/*.json，还是用了硬编码数据？

      输出格式：
      - 每个 JSON 文件的健康度评分（0-10）
      - 具体缺失字段和示例
      - 数据脱节的具体案例（AI 回复与数据文件不一致）

  - id: doc-audit
    title: '文档与优化项对齐审计'
    prompt: |
      审计 /Users/douba/Projects/AI-Sale/docs/OPTIMIZATION.md 中的 95 项优化建议的执行状态：

      1. **Phase 1 验收**：对照 OPTIMIZATION.md 第 7 章的验收标准，逐条检查以下 P0 项：
         - G1~G5（数据真实度）
         - G6~G7（加载/空态）
         - G10~G12（跨场景数据互通）
         - G29~G30（水印/声明）
         - S1-1/1-2/1-8（场景1核心）
         - S2-1/2-2/2-3/2-10（场景2核心）
         - S3-1/3/4/10（场景3核心）
         - S5-1~4（场景5核心）
         - S7-1/3/9（场景7核心）

      2. **执行状态分类**：
         - ✅ 已完成并验收
         - ⚠️ 部分完成（说明完成度百分比）
         - ❌ 未开始
         - 📋 文档存在但无法判断（需人工验证）

      3. **关键遗漏**：找出已完成但未按验收标准检验的项（做了但不完整）

      4. **依赖关系检查**：对照第 9 章的依赖关系图，哪些前置条件（G1/G2/G3/G10等）没完成导致下游场景无法推进？

      输出格式：
      - 每个检查项的状态 + 简短说明
      - 未完成项的阻塞原因（什么依赖没满足）
      - 高优先级行动建议（哪些没做完的项影响最大）